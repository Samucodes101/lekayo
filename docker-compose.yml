version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: lekayo-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lekayo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lekayo_network

  redis:
    image: redis:7-alpine
    container_name: lekayo-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lekayo_network

  app:
    build: .
    container_name: lekayo-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lekayo
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
    networks:
      - lekayo_network

volumes:
  postgres_data:
  redis_data:

networks:
  lekayo_network:
    driver: bridge